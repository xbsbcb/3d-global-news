services:
  # Frontend (Vue 3 + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - globe-network

  # Backend (Rust + Axum)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=sqlite:///app/data/globe_news.db?mode=rwc
      - WORLDNEWS_API_KEY=${WORLDNEWS_API_KEY:-cf06fcc50d56424d9f3fe328f91ceb91}
      - RUST_LOG=info
      - PORT=3001
    volumes:
      - globe-data:/app/data
    networks:
      - globe-network

networks:
  globe-network:
    driver: bridge

volumes:
  globe-data:
