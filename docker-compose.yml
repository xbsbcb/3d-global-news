version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - globenews

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://globenews:globenews123@db:5432/globenews
      - PORT=4000
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - globenews
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=globenews
      - POSTGRES_USER=globenews
      - POSTGRES_PASSWORD=globenews123
    networks:
      - globenews
    restart: unless-stopped

  rss-cache:
    image: diygod/rsshub:latest
    ports:
      - "1200:1200"
    environment:
      - PORT=1200
    networks:
      - globenews
    restart: unless-stopped
    profiles:
      - rss

networks:
  globenews:
    driver: bridge

volumes:
  pgdata:
